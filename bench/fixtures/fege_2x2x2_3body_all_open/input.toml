# Three-body fixture with all body-3 cutoffs opened (all-neighbor).
#
# Same crystal structure as `test/integration/fege_2x2x2` (64-atom FeGe
# B20 2x2x2 supercell), `nbody = 3`. Identical to the lightweight fixture
# `fege_2x2x2_3body_light` EXCEPT that `[interaction.body3]` uses
# `cutoff = -1` for every species pair (include all body-3 triples within
# the supercell); body-2 cutoffs stay at the finite 3.0 Angstrom.
#
# This is the heaviest body-3 case the package supports on this lattice:
# body-3 raw clusters grow to ~9400, irreducible representatives to
# ~3100, and orbits to ~270. Cheap enough (sub-second) to ship as a
# regression-sized benchmark after the canonical-form lookup landed in
# `irreducible_clusters` and the duplicate `set_mindist_pairs` call was
# removed.

[general]
name = "Fe Ge"
nat = 64
kd = ["Fe", "Ge"]
periodicity = [true, true, true]

[symmetry]
tolerance = 1.0e-5
isotropy = false

[interaction]
nbody = 3

[interaction.body1]
lmax.Fe = 2
lmax.Ge = 2

[interaction.body2]
cutoff."Fe-Fe" = 3.0
cutoff."Fe-Ge" = 3.0
cutoff."Ge-Ge" = 3.0
lsum = 4

[interaction.body3]
cutoff."Fe-Fe" = -1
cutoff."Fe-Ge" = -1
cutoff."Ge-Ge" = -1
lsum = 4

[structure]
lattice = [
  [9.378, 0.0, 0.0],
  [0.0, 9.378, 0.0],
  [0.0, 0.0, 9.378],
]
kd_list = [
