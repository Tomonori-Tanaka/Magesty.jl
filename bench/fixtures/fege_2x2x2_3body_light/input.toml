# Lightweight three-body fixture for the Cluster-construction benchmark.
#
# Same crystal structure as `test/integration/fege_2x2x2` (64-atom FeGe
# B20 2x2x2 supercell), but the interaction is extended to `nbody = 3`.
#
# The cutoff radii are deliberately FINITE (not -1) so the three-body
# combinatorics stay small and `bench/benchmark_cluster.jl` finishes in a
# few seconds. This is the development / quick-iteration fixture. The full
# `cutoff = -1` (all-neighbor) three-body case that takes ~4000 s is a
# separate, heavier fixture added later.
#
# Cutoff choice: 3.0 Angstrom keeps each pair within roughly the first
# coordination shell. Tune this value if the run is too slow or too sparse.

[general]
name = "Fe Ge"
nat = 64
kd = ["Fe", "Ge"]
periodicity = [true, true, true]

[symmetry]
tolerance = 1.0e-5
isotropy = false

[interaction]
nbody = 3

[interaction.body1]
lmax.Fe = 2
lmax.Ge = 2

[interaction.body2]
cutoff."Fe-Fe" = 3.0
cutoff."Fe-Ge" = 3.0
cutoff."Ge-Ge" = 3.0
lsum = 4

[interaction.body3]
cutoff."Fe-Fe" = 3.0
cutoff."Fe-Ge" = 3.0
cutoff."Ge-Ge" = 3.0
lsum = 4

[structure]
lattice = [
  [9.378, 0.0, 0.0],
  [0.0, 9.378, 0.0],
  [0.0, 0.0, 9.378],
]
